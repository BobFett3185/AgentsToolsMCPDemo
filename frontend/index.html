<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agentic Course Planner</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="planner-panel" aria-label="Course planner">
        <header class="topbar">
          <div>
            <h1>Agentic Course Planner</h1>
            <p>Enter your interests, career goal, and desired course load.</p>
          </div>
        </header>

        <form id="scheduleForm" class="composer intake-form">
          <select id="studentId" name="studentId" aria-label="Student profile">
            <option value="demo-student" selected>demo student</option>
            <option value="another-demo-student">Another Demo Student</option>
            <option value="new-student">New Student</option>
            <option value="systems-track">Systems Track Student</option>
            <option value="ai-curious">AI Curious Student</option>
            <option value="custom-student">Custom Student</option>
          </select>

          <input
            id="interests"
            name="interests"
            type="text"
            placeholder="Interests"
            required
          >

          <input
            id="careerGoal"
            name="careerGoal"
            type="text"
            placeholder="Career Goals"
            required
          >

          <select id="courseLoad" name="courseLoad" required>
            <option value="3">3 courses</option>
            <option value="4" selected>4 courses</option>
            <option value="5">5 courses</option>
            <option value="6">6 courses</option>
          </select>

          <button type="submit">Generate schedule</button>
        </form>

        <section class="results" aria-live="polite">
          <div id="messages" class="messages">
            <article class="message assistant empty-state">
              Your generated schedule will appear here, followed by the trace of agent calls.
            </article>
          </div>
        </section>

      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
