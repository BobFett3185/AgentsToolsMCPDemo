<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agentic Course Planner</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="chat-panel" aria-label="Course planner chat">
        <header class="topbar">
          <div>
            <h1>Agentic Course Planner</h1>
            <p>Gemini agent loop with subagents and tools</p>
          </div>
          <label class="student-picker">
            <span>Student</span>
            <select id="studentId">
              <option value="keane">Keane</option>
              <option value="new-student">New Student</option>
              <option value="systems-track">Systems Track Student</option>
              <option value="ai-curious">AI Curious Student</option>
              <option value="custom-student">Custom Student</option>
            </select>
          </label>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message assistant">
            Ask about a specific course, prerequisites, professor reviews, or schedule planning.
            I can help you make your schedule for next semester! 
            Try to include your major year and desired course load!
          </article>
        </div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Can I take CS 3345 next semester?"
            required
          >
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
